spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_support
    username: erp_user
    password: erp_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

app:
  jwt:
    secret: erp-support-portal-super-secret-jwt-key-change-in-production-2024
    expiration-ms: 86400000   # 24 hours

logging:
  level:
    com.erp.support: DEBUG
    org.springframework.security: INFO
